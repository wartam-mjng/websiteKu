<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise CMS - Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        .loading-spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .sidebar-item-active {
            background: linear-gradient(to right, #eff6ff, #ffffff);
            border-right: 4px solid #3b82f6;
            color: #1d4ed8;
        }

        #page-content { transition: all 0.3s ease; }
        
        .prose h1 { color: #1e3a8a; font-weight: 800; margin-bottom: 1.5rem; }
        .prose p { color: #4b5563; line-height: 1.75; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Banner Style dengan Gambar Background yang lebih terang */
        .banner-container {
            position: relative;
            background-color: #0f172a;
            /* Menggunakan overlay gradasi untuk menjaga keterbacaan teks */
            background-image: linear-gradient(to right, rgba(15, 23, 42, 0.6), rgba(30, 64, 175, 0.4)), 
                              url('https://images.unsplash.com/vector-1774370629298-4486bde1e34b?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
        }
        
        .banner-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden backdrop-blur-sm"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out border-r border-slate-200 flex flex-col shadow-xl md:shadow-none">
        <div class="h-20 flex items-center px-8 border-b border-slate-100 bg-white shrink-0">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                    <i data-lucide="layers" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-600">SmartCMS</span>
            </div>
        </div>
        
        <div class="flex-grow overflow-y-auto py-6 px-4 space-y-1 custom-scrollbar" id="main-nav">
            <!-- Navigasi Dinamis -->
        </div>

        <div class="p-6 border-t border-slate-100 shrink-0">
            <div class="bg-slate-50 rounded-xl p-4 flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">GS</div>
                <div>
                    <p class="text-xs font-semibold text-slate-700">Status Database</p>
                    <p class="text-[10px] text-green-600 flex items-center">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5"></span> Terhubung
                    </p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-grow flex flex-col min-w-0 md:ml-72 transition-all duration-300 h-screen">
        <!-- Top Navbar -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30 shrink-0">
            <div class="flex items-center space-x-4">
                <button id="toggle-sidebar" class="p-2.5 rounded-xl hover:bg-slate-100 text-slate-600 transition-all active:scale-95">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div id="breadcrumb" class="hidden lg:flex items-center space-x-2 text-sm text-slate-400">
                    <span>Admin</span>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    <span id="breadcrumb-active" class="text-blue-600 font-medium italic">Halaman</span>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex flex-col items-end hidden sm:block">
                    <p class="text-xs font-bold text-slate-700">Administrator</p>
                    <p class="text-[10px] text-slate-400">Online</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="w-9 h-9 rounded-xl shadow-sm border border-slate-200" alt="Avatar">
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-grow overflow-y-auto custom-scrollbar">
            
            <div id="loader" class="flex flex-col items-center justify-center py-32">
                <div class="loading-spinner mb-6"></div>
                <p class="text-slate-400 font-medium tracking-wide">MENYIAPKAN HALAMAN...</p>
            </div>

            <!-- Area Konten Dinamis -->
            <div id="content-area" class="hidden animate-in fade-in zoom-in-95 duration-500">
                
                <!-- Hero Banner Section -->
                <section class="banner-container relative overflow-hidden">
                    <div class="banner-pattern absolute inset-0 opacity-30"></div>
                    
                    <div class="max-w-5xl mx-auto px-6 py-14 md:py-20 relative z-10">
                        <div class="flex flex-col items-start space-y-3">
                            <span class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md border border-white/30 rounded-lg text-white text-[10px] font-bold tracking-widest uppercase shadow-sm">
                                Konten Dinamis
                            </span>
                            <h1 id="hero-title" class="text-3xl md:text-5xl font-black text-white leading-tight drop-shadow-md">
                                Judul Halaman
                            </h1>
                            <p id="hero-subtitle" class="text-white/90 text-sm md:text-base max-w-2xl font-normal leading-relaxed drop-shadow-sm">
                                Kelola konten website Anda dengan mudah melalui Google Sheets.
                            </p>
                        </div>
                    </div>

                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
                </section>

                <!-- Konten Utama (Overlapping Card) -->
                <div class="max-w-5xl mx-auto px-6 -mt-8 relative z-20">
                    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 p-8 md:p-12 min-h-[400px] mb-12">
                        <article id="page-content" class="prose prose-slate lg:prose-xl max-w-none prose-headings:text-slate-900 prose-a:text-blue-600">
                            <!-- Konten dinamis -->
                        </article>
                    </div>
                </div>

            </div>

            <!-- Error State -->
            <div id="error-area" class="hidden text-center py-20 bg-white m-10 rounded-3xl shadow-xl border border-red-50 p-10">
                <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="alert-circle" class="w-10 h-10 text-red-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Sinkronisasi Gagal</h2>
                <p id="error-msg" class="text-slate-500 mb-8 max-w-md mx-auto"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg active:scale-95">
                    Coba Sinkronkan Kembali
                </button>
            </div>

        </main>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxr6hDd2s0uKGtaStd4_V63ovq6mNPd80sCRi_OqEcSORj6T7P2eG7n02qaMaFG6LPDdQ/exec';
        
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggleBtn = document.getElementById('toggle-sidebar');
        const mainWrapper = document.querySelector('.md\\:ml-72');
        let siteData = { menu: [], content: {} };

        function toggleSidebar() {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            } else {
                sidebar.classList.toggle('md:-translate-x-full');
                mainWrapper.classList.toggle('md:ml-0');
            }
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        async function init() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                
                processData(data);
                renderNavigation();
                handleRouting();
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content-area').classList.remove('hidden');
                lucide.createIcons();

            } catch (error) {
                showError("Tidak dapat terhubung ke database. Periksa URL Apps Script Anda.");
            }
        }

        function processData(data) {
            siteData.menu = data.menu.slice(1).map(row => ({ 
                title: row[0], 
                slug: row[1],
                icon: row[2] || 'file-text'
            }));
            data.content.slice(1).forEach(row => { siteData.content[row[0]] = row[1]; });
        }

        function renderNavigation() {
            const nav = document.getElementById('main-nav');
            let navHtml = '';
            
            siteData.menu.forEach(item => {
                navHtml += `
                    <a href="#${item.slug}" 
                       data-slug="${item.slug}"
                       class="nav-link group flex items-center px-6 py-3.5 text-sm font-semibold text-slate-500 rounded-xl hover:bg-slate-50 hover:text-blue-600 transition-all duration-200">
                        <i data-lucide="${item.icon}" class="w-5 h-5 mr-4 opacity-70 group-hover:opacity-100"></i>
                        ${item.title}
                    </a>`;
            });
            
            nav.innerHTML = navHtml;
            lucide.createIcons();

            document.querySelectorAll('.nav-link').forEach(link => {
                link.onclick = (e) => {
                    const slug = link.getAttribute('data-slug');
                    navigate(slug);
                    if (window.innerWidth < 768) toggleSidebar();
                };
            });
        }

        function navigate(slug) {
            window.location.hash = slug;
            const content = siteData.content[slug] || "<h1>404</h1><p>Halaman tidak ditemukan.</p>";
            const pageData = siteData.menu.find(m => m.slug === slug);
            
            document.getElementById('hero-title').innerText = pageData ? pageData.title : "Halaman";
            document.getElementById('breadcrumb-active').innerText = pageData ? pageData.title : "Halaman";
            
            document.querySelectorAll('.nav-link').forEach(l => {
                if (l.getAttribute('data-slug') === slug) {
                    l.classList.add('sidebar-item-active');
                    l.classList.remove('text-slate-500');
                } else {
                    l.classList.remove('sidebar-item-active');
                    l.classList.add('text-slate-500');
                }
            });

            const contentArea = document.getElementById('page-content');
            contentArea.style.opacity = 0;
            
            setTimeout(() => {
                contentArea.innerHTML = content;
                contentArea.style.opacity = 1;
                document.querySelector('main').scrollTop = 0;
            }, 150);
        }

        function handleRouting() {
            const hash = window.location.hash.substring(1);
            if (hash && siteData.content[hash]) {
                navigate(hash);
            } else if (siteData.menu.length > 0) {
                navigate(siteData.menu[0].slug);
            }
        }

        function showError(msg) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-area').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
            lucide.createIcons();
        }

        window.onload = init;
        window.onhashchange = handleRouting;
    </script>
</body>
</html>
